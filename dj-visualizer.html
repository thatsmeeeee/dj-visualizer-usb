<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISUALS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bass: 0;
    --mid: 0;
    --high: 0;
    --energy: 0;
  }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Space Mono', monospace;
    cursor: none;
  }

  body.ui-visible { cursor: default; }

  /* ── CANVAS ── */
  #canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── OVERLAY GRID LINES ── */
  #grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 1;
    transition: opacity 0.5s;
  }

  /* ── SCANLINES ── */
  #scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    z-index: 2;
  }

  /* ── VIGNETTE ── */
  #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    z-index: 3;
  }

  /* ── FLASH OVERLAY ── */
  #flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: #fff;
    opacity: 0;
    z-index: 10;
    mix-blend-mode: screen;
  }

  /* ── STROBE OVERLAY ── */
  #strobe {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: #fff;
    opacity: 0;
    z-index: 11;
    mix-blend-mode: screen;
  }

  /* ── COLOR WASH ── */
  #wash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    z-index: 4;
    mix-blend-mode: color;
    transition: background 0.1s;
  }

  /* ── UI PANEL ── */
  #ui {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 100;
    background: transparent;
    border-top: 1px solid rgba(0,240,255,0.28);
    box-shadow: 0 -8px 20px rgba(0,0,0,0.55), inset 0 1px 0 rgba(0,240,255,0.08);
    opacity: 0;
    transition: opacity 0.28s;
  }
  #ui.visible { opacity: 1; }

  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    padding: 8px 16px;
    min-height: 38px;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.9);
    cursor: pointer;
    border-radius: 0;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
    box-shadow: none;
  }
  .btn:hover {
    background: rgba(0,240,255,0.08);
    border-color: rgba(0,240,255,0.78);
    color: #e9feff;
  }
  .btn.active {
    background: rgba(0,240,255,0.12);
    border-color: rgba(0,240,255,0.95);
    color: #eaffff;
  }
  .btn.danger { border-color: rgba(255,80,80,0.65); color: rgba(255,120,120,1); }
  .btn.danger:hover { background: rgba(255,50,50,0.15); border-color: rgba(255,90,90,0.9); }

  #status {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(210,255,255,0.84);
    margin-left: auto;
    letter-spacing: 1.5px;
    padding: 7px 10px;
    border-radius: 0;
    border: 1px solid rgba(0,240,255,0.34);
    background: rgba(0,240,255,0.06);
  }

  .sep {
    width: 1px;
    height: 26px;
    background: rgba(0,240,255,0.36);
    box-shadow: none;
  }

  /* ── LEVEL METERS ── */
  #meters {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 4px;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    padding: 7px 9px;
    border-radius: 0;
    border: 1px solid rgba(255,255,255,0.14);
    border-top-color: rgba(0,240,255,0.4);
    background: rgba(0,0,0,0.52);
    transition: opacity 0.4s;
  }
  #meters.visible {
    opacity: 1;
    visibility: visible;
  }

  .meter-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .meter-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    width: 28px;
    text-align: right;
  }
  .meter-bar {
    width: 80px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    border-radius: 2px;
    width: 0%;
    transition: width 0.05s;
  }
  #m-bass .meter-fill { background: #ff3030; }
  #m-mid .meter-fill  { background: #00e5ff; }
  #m-high .meter-fill { background: #aaff00; }
  #m-bpm .meter-fill  { background: #ff4dff; }

  .meter-value {
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.55);
    width: 38px;
    text-align: left;
  }

  #energy-state {
    width: 62px;
    color: rgba(255,255,255,0.72);
  }

  /* ── MODE LABEL ── */
  #mode-label {
    position: fixed;
    top: 20px;
    left: 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(225,255,255,0.88);
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(0,240,255,0.3);
    padding: 6px 10px;
    border-radius: 0;
    text-shadow: 0 0 10px rgba(0,240,255,0.22);
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  #mode-label.visible {
    opacity: 1;
    visibility: visible;
  }

  /* ── SONG SECTION LABEL ── */
  #section-label {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.52);
    z-index: 105;
    pointer-events: none;
  }

  /* ── DEBUG OVERLAY ── */
  #debug {
    position: fixed;
    left: 14px;
    bottom: 96px;
    z-index: 130;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    line-height: 1.35;
    letter-spacing: 0.4px;
    color: rgba(255,255,255,0.9);
    background: rgba(0,0,0,0.62);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 12px;
    white-space: pre;
    display: none;
    pointer-events: none;
  }
  #debug.visible { display: block; }

  /* ── IDLE MESSAGE ── */
  #idle {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1s;
  }
  #idle.hidden { opacity: 0; }

  #idle h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 12vw, 120px);
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.06);
    line-height: 1;
  }
  #idle p {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.2);
    margin-top: 16px;
  }
</style>
</head>

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

const KEY_TEMPLATE_MAJOR = [6.35, 2.23, 3.48, 2.33, 4.38, 4.09, 2.52, 5.19, 2.39, 3.66, 2.29, 2.88];
const KEY_TEMPLATE_MINOR = [6.33, 2.68, 3.52, 5.38, 2.60, 3.53, 2.54, 4.75, 3.98, 2.69, 3.34, 3.17];
const NOTE_NAMES = ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
const CIRCLE_OF_FIFTHS_INDEX = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];

function dot12(a, b, shift = 0) {
  let s = 0;
  for (let i = 0; i < 12; i++) {
    s += a[(i + shift) % 12] * b[i];
  }
  return s;
}

function normalize12(v) {
  let sum = 0;
  for (let i = 0; i < 12; i++) sum += v[i];
  if (sum <= 1e-6) return new Array(12).fill(0);
  const out = new Array(12);
  for (let i = 0; i < 12; i++) out[i] = v[i] / sum;
  return out;
}

function estimateKeyFromChroma(chroma) {
  let best = -1;
  let second = -1;
  let bestRoot = 0;
  let bestMode = 'major';

  for (let root = 0; root < 12; root++) {
    const majorScore = dot12(chroma, KEY_TEMPLATE_MAJOR, root);
    if (majorScore > best) {
      second = best;
      best = majorScore;
      bestRoot = root;
      bestMode = 'major';
    } else if (majorScore > second) {
      second = majorScore;
    }

    const minorScore = dot12(chroma, KEY_TEMPLATE_MINOR, root);
    if (minorScore > best) {
      second = best;
      best = minorScore;
      bestRoot = root;
      bestMode = 'minor';
    } else if (minorScore > second) {
      second = minorScore;
    }
  }

  const conf = clamp((best - Math.max(0, second)) / Math.max(1e-3, best), 0, 1);
  return { root: bestRoot, mode: bestMode, confidence: conf };
}

function keyRootToHue(root) {
  const idx = CIRCLE_OF_FIFTHS_INDEX.indexOf(root);
  const step = idx >= 0 ? idx : root;
  return (step * 30) % 360;
}

function setStatusOverride(text, durationMs = 1800) {
  el.status.textContent = text;
  state.statusOverrideUntilMs = performance.now() + durationMs;
}

function qualityButtonLabel() {
  return state.qualityAuto
    ? 'QUALITY: AUTO'
    : `QUALITY: ${state.qualityNames[state.qualityLevel]}`;
}

function refreshQualityButton() {
  el.btnQuality.textContent = qualityButtonLabel();
  el.btnQuality.classList.toggle('active', state.qualityAuto);
}

function refreshPresetButton() {
  el.btnPreset.textContent = `PRESET: ${state.presets[state.presetIndex].name}`;
}

function updateTuneUi() {
  // Auto-tune is internal-only; no direct UI controls.
}

function getQualityProfile(level = state.qualityLevel) {
  const i = clamp(Math.round(level), 0, state.qualityProfiles.length - 1);
  return state.qualityProfiles[i];
}

function applyQuality(level, forceResize = false) {
  const next = clamp(Math.round(level), 0, state.qualityProfiles.length - 1);
  const changed = next !== state.qualityLevel;
  state.qualityLevel = next;

  const profile = getQualityProfile(next);
  state.renderScale = profile.renderScale;

  if (state.analysisHz !== profile.analysisHz) {
    state.analysisHz = profile.analysisHz;
    if (state.running && state.analyser) startAnalysisLoop();
  }

  if (state.particles.length > profile.maxParticles) {
    state.particles.splice(0, state.particles.length - profile.maxParticles);
  }
  if (state.pulseWaves.length > profile.pulseWaveMax) {
    state.pulseWaves.splice(0, state.pulseWaves.length - profile.pulseWaveMax);
  }
  if (state.shatterCols !== profile.shatterCols || state.shatterRows !== profile.shatterRows) {
    state.shatterCols = profile.shatterCols;
    state.shatterRows = profile.shatterRows;
    state.shatterMesh = [];
  }

  if (changed || forceResize) resize();
}

function resetPerformanceGovernor(nowMs = performance.now(), keepQuality = true) {
  state.governorPaused = false;
  state.fpsEma = 60;
  state.refreshEmaMs = 1000 / 60;
  state.lastPerfEvalAt = nowMs;
  state.qualityLockUntilMs = nowMs;
  state.governorWarmupUntilMs = nowMs + state.governorWarmupMs;
  if (!keepQuality) applyQuality(1, true);
}

function updatePerformanceGovernor(frameDtMs, nowMs) {
  if (state.governorPaused) return;
  if (frameDtMs > 250) return;

  state.refreshEmaMs += (frameDtMs - state.refreshEmaMs) * 0.08;
  const refreshHz = clamp(1000 / Math.max(4, state.refreshEmaMs), state.minRefreshHz, state.maxRefreshHz);

  const fps = 1000 / Math.max(0.001, frameDtMs);
  state.fpsEma += (fps - state.fpsEma) * 0.06;

  if (!state.qualityAuto) return;

  if (nowMs < state.governorWarmupUntilMs) return;
  if ((nowMs - state.lastPerfEvalAt) < 1000) return;
  state.lastPerfEvalAt = nowMs;

  const lowThreshold = refreshHz * 0.50;
  const medThreshold = refreshHz * 0.75;
  const upThreshold = refreshHz * 0.92;

  let nextQuality = state.qualityLevel;
  if (state.fpsEma < lowThreshold) nextQuality = 0;
  else if (state.fpsEma < medThreshold) nextQuality = Math.min(nextQuality, 1);
  else if (state.fpsEma > upThreshold) nextQuality = Math.min(2, nextQuality + 1);

  if (nextQuality !== state.qualityLevel) {
    const isUpgrade = nextQuality > state.qualityLevel;
    if (isUpgrade) {
      if (nowMs >= state.qualityLockUntilMs) {
        applyQuality(nextQuality);
        state.qualityLockUntilMs = nowMs + state.upgradeLockMs;
      }
    } else {
      applyQuality(nextQuality);
    }
  }
}

function getMeanStd(arr, meanHint = null) {
  const mean = meanHint !== null ? meanHint : arr.reduce((a,b)=>a+b,0)/arr.length;
  let v = 0;
  for (let i=0; i<arr.length; i++) {
    const d = arr[i] - mean;
    v += d * d;
  }
  return { mean, std: Math.sqrt(v / arr.length) };
}

function pushRolling(value, arr, indexKey, sumKey) {
  state[sumKey] -= arr[state[indexKey]];
  arr[state[indexKey]] = value;
  state[sumKey] += value;
  state[indexKey] = (state[indexKey] + 1) % arr.length;
  return state[sumKey] / arr.length;
}

function lerpHue(a, b, t) {
  const d = ((((b - a) % 360) + 540) % 360) - 180;
  return (a + d * t + 360) % 360;
}

function getSectionFadeAlpha() {
  if (state.musicState === 'IDLE')      return 0.30;
  if (state.musicState === 'DROP')      return 0.02;
  if (state.musicState === 'BUILD')     return 0.06;
  if (state.musicState === 'GROOVE')    return 0.12;
  if (state.musicState === 'BREAKDOWN') return 0.20;
  return 0.14;
}

function getSectionFlashGain() {
  if (state.musicState === 'IDLE') return 0.10;
  if (state.musicState === 'BREAKDOWN') return 0.22;
  if (state.musicState === 'GROOVE') return 0.90;
  if (state.musicState === 'BUILD') return 1.25;
  if (state.musicState === 'DROP') return 2.50;
  return 0.75;
}

function isRhythmicBeatLock(now = performance.now()) {
  const bpm = Math.round(state.bpmSmooth || 0);
  const recent = bpm >= 105 && bpm <= 180 && (now - state.lastBpmAt) < 6000;
  return recent && state.bpmConfidence >= 0.20;
}

function getReactiveFlashGain() {
  const hot = getFlashHotScore();
  const transient = clamp(state.onsetPulse * 0.8 + Math.max(0, state.fluxTrend) * 0.35 + state.subBassSmooth * 0.4, 0, 1.4);
  const signalGain = clamp(0.72 + hot * 1.55 + transient * 0.55, 0.72, 2.4);
  return Math.max(getSectionFlashGain(), signalGain);
}

function getSectionDrawAlpha() {
  return clamp(0.45 + state.sectionIntensityMul * 0.62, 0.24, 1);
}

function getVisualDrive() {
  return clamp(state.bassSmooth * 0.3 + state.beatPulse * 0.5 + state.onsetPulse * 0.2, 0, 1);
}

function getBeatReactiveFade(mult = 1) {
  return clamp(getSectionFadeAlpha() * mult * (1 - state.beatPulse * 0.6), 0.01, 0.95);
}

function updateBandBins() {
  if (!state.audioCtx || !state.bufferLen) return;
  const nyquist = state.audioCtx.sampleRate / 2;
  const hzToBin = (hz) => clamp(Math.round((hz / nyquist) * state.bufferLen), 0, Math.max(0, state.bufferLen - 1));
  state.bandBins.sub  = [hzToBin(40),   hzToBin(120)];
  state.bandBins.bass = [hzToBin(120),  hzToBin(250)];
  state.bandBins.mid  = [hzToBin(250),  hzToBin(3000)];
  state.bandBins.hi   = [hzToBin(3000), hzToBin(9000)];
}

function createEdmDropDetector({ sampleRate, fftSize, binCount }) {
  const nyquist = sampleRate / 2;
  const hzToBin = (hz) => Math.max(0, Math.min(binCount - 1, Math.round((hz / nyquist) * binCount)));
  const B_SUB0 = hzToBin(40),   B_SUB1 = hzToBin(120);
  const B_BAS0 = hzToBin(120),  B_BAS1 = hzToBin(250);
  const B_HI0  = hzToBin(3000), B_HI1  = hzToBin(9000);

  let eFast=0, eSlow=0, bFast=0, bSlow=0, hiFast=0, hiSlow=0, fluxFast=0, fluxSlow=0;
  let build=0, drop=0, section='GROOVE';
  const stats = { bass:{mu:0, v:1e-4}, flux:{mu:0, v:1e-4} };
  const upd = (s, x, a) => { const d = x - s.mu; s.mu += a * d; s.v = Math.max(1e-6, s.v + a * (d * d - s.v)); };
  const z = (s, x) => (x - s.mu) / Math.sqrt(s.v);
  let prev = new Uint8Array(binCount);
  let lastDropAt = -999, lastStateAt = -999, lastDipAt = -999, lastBreakdownAt = -999;
  const MIN_HOLD = 1.5, DROP_REFRACT = 5.5, BREAKDOWN_REFRACT = 4.0;
  const bandMean = (arr, i0, i1) => {
    let s=0, n=0;
    for (let i=i0; i<=i1; i++) { s += arr[i] || 0; n++; }
    return (s / Math.max(1, n)) / 255;
  };

  return {
    update(freq, nowSec) {
      const sub = bandMean(freq, B_SUB0, B_SUB1);
      const bas = bandMean(freq, B_BAS0, B_BAS1);
      const hi  = bandMean(freq, B_HI0, B_HI1);
      const energy = 0.45 * sub + 0.35 * bas + 0.20 * hi;

      let flux = 0;
      for (let i=0; i<=B_HI1; i++) flux += Math.max(0, (freq[i] || 0) - (prev[i] || 0));
      prev.set(freq);
      flux = flux / (Math.max(1, B_HI1) * 255);

      const AF=0.18, AS=0.015;
      eFast += (energy - eFast) * AF; eSlow += (energy - eSlow) * AS;
      bFast += (sub    - bFast) * AF; bSlow += (sub    - bSlow) * AS;
      hiFast += (hi    - hiFast) * AF; hiSlow += (hi    - hiSlow) * AS;
      fluxFast += (flux - fluxFast) * 0.25; fluxSlow += (flux - fluxSlow) * 0.02;

      upd(stats.bass, bFast, 0.02);
      upd(stats.flux, fluxFast, 0.02);
      const bassZ = z(stats.bass, bFast);
      const fluxZ = z(stats.flux, fluxFast);

      const eRatio = eFast / Math.max(1e-3, eSlow);
      const hiRatio = hiFast / Math.max(1e-3, hiSlow);
      const bassRatio = bFast / Math.max(1e-3, bSlow);

      const dipNow = (eFast < 0.78 * eSlow) && (fluxFast < fluxSlow * 0.9);
      if (dipNow) lastDipAt = nowSec;

      const buildHit = (fluxZ > 1.05 && hiRatio > 1.02 && eRatio > 1.00 && bassRatio < 1.16);
      build += ((buildHit ? 1 : 0) - build) * (buildHit ? 0.40 : 0.04);

      const dipRecent = (nowSec - lastDipAt) < 2.8;
      const refractOk = (nowSec - lastDropAt) > DROP_REFRACT;
      const breakdownOk = (nowSec - lastBreakdownAt) > BREAKDOWN_REFRACT;
      const dropHit = refractOk && dipRecent && build > 0.34 && (bassZ > 1.45) && (eRatio > 1.08) && (fluxZ > 0.30);
      drop += ((dropHit ? 1 : 0) - drop) * (dropHit ? 0.52 : 0.06);

      const canSwitch = (nowSec - lastStateAt) > MIN_HOLD;
      let wanted = section;
      const silenceHit = energy < 0.04 && eFast < 0.05;
      if (silenceHit) wanted = 'IDLE';
      else if (drop > 0.40) wanted = 'DROP';
      else if (build > 0.34) wanted = 'BUILD';
      else if (eRatio < 0.92 && fluxFast < fluxSlow * 0.85 && breakdownOk) wanted = 'BREAKDOWN';
      else wanted = 'GROOVE';

      if (wanted !== section && canSwitch) {
        section = wanted;
        lastStateAt = nowSec;
        if (section === 'DROP') lastDropAt = nowSec;
        if (section === 'BREAKDOWN') lastBreakdownAt = nowSec;
      }

      return { state: section, build, drop, bassZ, fluxZ, energyRatio: eRatio };
    }
  };
}

function canBeatPhaseTrigger(nowSec, lookAheadSec = 0.02) {
  return state.beatPhaseConfidence > 0.4 && nowSec >= (state.nextBeatAt - lookAheadSec);
}

function updateMusicalMeter(accent) {
  state.beatAccentHistory[state.beatAccentHistIndex] = clamp(accent, 0, 2.5);
  state.beatAccentHistIndex = (state.beatAccentHistIndex + 1) % state.beatAccentHistory.length;

  const beatsSeen = Math.min(state.musicalBeatCounter + 1, state.beatAccentHistory.length);
  if (beatsSeen >= 12) {
    const scores = [0, 0, 0, 0];
    for (let i = 0; i < beatsSeen; i++) {
      const idx = (state.beatAccentHistIndex - 1 - i + state.beatAccentHistory.length) % state.beatAccentHistory.length;
      const beatNum = state.musicalBeatCounter - i;
      const slot = ((beatNum % 4) + 4) % 4;
      scores[slot] += state.beatAccentHistory[idx];
    }
    let best = 0;
    let second = 0;
    for (let i = 1; i < 4; i++) {
      if (scores[i] > scores[best]) best = i;
    }
    for (let i = 0; i < 4; i++) {
      if (i === best) continue;
      if (scores[i] > scores[second] || second === best) second = i;
    }
    state.downbeatOffset = best;
    const total = scores[0] + scores[1] + scores[2] + scores[3];
    const margin = scores[best] - scores[second];
    state.downbeatConfidence = clamp(margin / Math.max(0.001, total * 0.55), 0, 1);
  } else {
    state.downbeatOffset = state.musicalBeatCounter % 4;
    state.downbeatConfidence = 0.2;
  }

  const beatInBar0 = ((state.musicalBeatCounter - state.downbeatOffset) % 4 + 4) % 4;
  state.beatInBar = beatInBar0 + 1;
  if (state.beatInBar === 1) {
    state.barCounter += 1;
    state.phraseBarIndex = ((state.barCounter - 1) % state.phraseBars + state.phraseBars) % state.phraseBars;
    state.phraseBoundaryPulse = state.phraseBarIndex === 0 ? 1 : Math.max(0, state.phraseBoundaryPulse * 0.6);
  } else {
    state.phraseBoundaryPulse *= 0.92;
  }
  state.phraseProgress = clamp((state.phraseBarIndex + (state.beatInBar - 1) / 4) / Math.max(1, state.phraseBars), 0, 1);
  state.musicalBeatCounter += 1;
}

function updateMusicState(now, detectorState = null) {
  if (state.warmupFrames > 0) {
    state.warmupFrames--;
    return;
  }

  const nowSec = state.audioCtx ? state.audioCtx.currentTime : (now / 1000);
  const prev = state.musicState;
  let wanted = detectorState || prev;
  let reason = detectorState ? `detector:${detectorState}` : 'detector:none';

  // Keep BUILD/DROP sticky for a short while and allow fallback promotion
  // when detector confidence is present but state output lags in transitions.
  if (prev === 'DROP' && wanted !== 'DROP' && state.ddDrop > 0.26) {
    wanted = 'DROP';
    reason = 'sticky:drop';
  }
  if (prev === 'BUILD' && wanted === 'GROOVE' && state.ddBuild > 0.24) {
    wanted = 'BUILD';
    reason = 'sticky:build';
  }
  if (wanted === 'GROOVE' && state.ddDrop > 0.34 && state.subBassSmooth > 0.14) {
    wanted = 'DROP';
    reason = 'fallback:drop';
  } else if (wanted === 'GROOVE' && state.ddBuild > 0.30 && state.ddFluxZ > 0.55) {
    wanted = 'BUILD';
    reason = 'fallback:build';
  }

  const minHold = state.stateHoldTimes[prev] ?? 2000;
  const elapsed = (nowSec - state.lastStateSwitchSec) * 1000;
  state.sectionWanted = wanted;
  state.sectionReason = reason;
  state.sectionElapsedMs = elapsed;
  state.sectionMinHoldMsDebug = minHold;
  if (wanted !== prev && elapsed > minHold) {
    state.musicState = wanted;
    state.lastStateSwitchSec = nowSec;
    state.sectionLastSwitchAt = now;

    if (wanted === 'DROP') {
      state.dropImpactFrames = 8;
      state.impactPulse = Math.max(state.impactPulse, 1.6);
      const transitionHot = getFlashHotScore();
      if (state.strobeEnabled && canBeatPhaseTrigger(nowSec, 0.02) && transitionHot > 0.42 && canTriggerFlashEvent(now)) {
        state.flashOpacity = Math.max(state.flashOpacity, 1.85 + transitionHot * 1.75);
        state.floodFrames = 5;
        state.floodHue = getPaletteHue(24 + Math.random() * 36);
        SafetyLimiter.recordFlash(now);
      }
      if (state.strobeEnabled && canBeatPhaseTrigger(nowSec, 0.02) && transitionHot > 0.40) {
        triggerStrobePulse(1.15 + transitionHot * 0.55, now);
      }
      spawnBurst(36 + Math.floor(52 * transitionHot));
    }
  }

  const ratio = state.shortEnergy / Math.max(state.longEnergy, 0.001);

  // ── Visual targets per state ─────────────────────────────────────────────
  let targetMul        = 1;
  let targetBrightness = 0.62;
  let targetMotion     = 1;

  if (state.musicState === 'IDLE') {
    targetMul        = 0.18;
    targetBrightness = 0.34;
    targetMotion     = 0.30;
  } else if (state.musicState === 'BUILD') {
    // Ramp: as ratio climbs toward ~1.5, push toward full intensity
    const slope = clamp((ratio - 1.05) / 0.45, 0, 1);
    targetMul        = 0.55 + slope * 1.10;
    targetBrightness = 0.56 + slope * 0.62;
    targetMotion     = 0.82 + slope * 0.70;
  } else if (state.musicState === 'DROP') {
    targetMul        = 2.65;
    targetBrightness = 1.35;
    targetMotion     = 2.45;
  } else if (state.musicState === 'GROOVE') {
    targetMul        = 0.98;
    targetBrightness = 0.72;
    targetMotion     = 0.95;
  } else if (state.musicState === 'BREAKDOWN') {
    targetMul        = 0.32;
    targetBrightness = 0.42;
    targetMotion     = 0.55;
  }

  // DROP impact boost
  if (state.dropImpactFrames > 0) {
    const k = state.dropImpactFrames / 8;
    targetMul        += 0.35 * k;
    targetBrightness  = Math.max(targetBrightness, 0.92 + k * 0.08);
    targetMotion      = Math.max(targetMotion, 1.35 + k * 0.4);
    state.dropImpactFrames -= 1;
  }

  // ── Lerp toward targets ──────────────────────────────────────────────────
  const mulRate    = (targetMul > state.sectionIntensityMul) ? 0.12 : 0.06;
  state.sectionIntensityMul += (targetMul - state.sectionIntensityMul) * mulRate;
  state.visualBrightnessTarget = targetBrightness;
  state.visualMotionTarget     = targetMotion;
  state.visualBrightness += (state.visualBrightnessTarget - state.visualBrightness) * 0.06;
  state.visualMotion     += (state.visualMotionTarget     - state.visualMotion)     * 0.08;
  // Keep visuals readable during live playback even in calmer sections.
  state.visualBrightness = Math.max(state.visualBrightness, 0.34);
}

function applyPreset(index) {
  state.presetIndex = index % state.presets.length;
  const p = state.presets[state.presetIndex];
  state.beatK = p.beatK;
  state.highK = p.highK;
  state.beatCooldownMs = p.beatCooldownMs;
  state.bpmConfidenceMin = p.bpmConfidenceMin;
  state.baseMaxStrobeHz = p.maxStrobeHz;
  state.maxStrobeHz = p.maxStrobeHz;
  state.baseTuneSensitivity = p.tuneSensitivity;
  state.baseTuneFlashRate = p.tuneFlashRate;
  state.baseTuneSafety = p.tuneSafety;
  state.tuneSensitivity = p.tuneSensitivity;
  state.tuneFlashRate = p.tuneFlashRate;
  state.tuneSafety = p.tuneSafety;
  state.qualityAuto = p.qualityAuto;
  applyQuality(p.qualityLevel, true);
  resetPerformanceGovernor(performance.now(), true);
  refreshPresetButton();
  refreshQualityButton();
  updateTuneUi();
}

function updateAutoTune() {
  if (!state.autoTuneEnabled) return;

  const reactiveGain = getReactiveFlashGain();
  const signalRaw =
    state.energySmooth * 0.9 +
    state.subBassSmooth * 0.65 +
    state.fluxTrend * 0.8 +
    state.bassSpike * 0.6 +
    state.harmonicTension * 0.35;
  const signal = clamp((signalRaw - 0.22) / 1.0, 0, 1);

  const fpsPenalty = clamp((46 - state.fpsEma) / 20, 0, 1);
  const qualityPenalty = state.qualityAuto
    ? fpsPenalty
    : (state.qualityLevel === 0 ? 0.35 : state.qualityLevel === 1 ? 0.15 : 0);

  const sensTarget = clamp(
    state.baseTuneSensitivity * (0.92 + signal * 0.34 - qualityPenalty * 0.10),
    0.70,
    1.60
  );
  const rateTarget = clamp(
    state.baseTuneFlashRate * (0.92 + signal * 0.62 + reactiveGain * 0.26 - qualityPenalty * 0.28),
    0.60,
    1.65
  );
  const safeTarget = clamp(
    state.baseTuneSafety * (1.02 - signal * 0.20 - reactiveGain * 0.16 + qualityPenalty * 0.30),
    0.60,
    1.40
  );

  state.tuneSensitivity += (sensTarget - state.tuneSensitivity) * 0.08;
  state.tuneFlashRate += (rateTarget - state.tuneFlashRate) * 0.08;
  state.tuneSafety += (safeTarget - state.tuneSafety) * 0.08;
}

function applyPresetToRunningAnalyser() {
  if (!state.running || !state.analyser) return;
  const p = state.presets[state.presetIndex];

  state.analyser.fftSize = p.fftSize;
  state.analyser.smoothingTimeConstant = p.smoothing;
  state.analyser.minDecibels = -90;
  state.analyser.maxDecibels = -18;

  const newLen = state.analyser.frequencyBinCount;
  if (newLen !== state.bufferLen) {
    state.bufferLen = newLen;
    state.dataArray = new Uint8Array(newLen);
    state.prevFreqArray = new Uint8Array(newLen);
    state.waveArray = new Uint8Array(newLen);
  }

  updateBandBins();
  state.dropDetector = createEdmDropDetector({
    sampleRate: state.audioCtx.sampleRate,
    fftSize: state.analyser.fftSize,
    binCount: state.bufferLen,
  });
}

function triggerStrobePulse(intensity, now = performance.now()) {
  if (!SafetyLimiter.allowFlash(now, state.strobeMode === 2)) return;
  state.flashColorPhase = !state.flashColorPhase;
  state.strobeOpacity = Math.max(state.strobeOpacity, clamp(intensity, 0, 1));
  state.strobePulseUntil = Math.max(state.strobePulseUntil, now + state.strobePulseMs);
  state.lastStrobeHit = now;
  SafetyLimiter.recordFlash(now);
}

function getFlashHotScore() {
  const sens = state.tuneSensitivity;
  const energyN = clamp(((state.energySmooth * sens) - 0.08) / 0.62, 0, 1);
  const subN = clamp(((state.subBass * sens) - 0.10) / 0.75, 0, 1);
  const intensityN = clamp((state.intensity - 0.65) / 2.25, 0, 1);
  const bpmConfN = clamp((state.bpmConfidence - 0.15) / 0.85, 0, 1);
  const phraseN = clamp(state.phraseBoundaryPulse, 0, 1);
  const tensionN = clamp(state.harmonicTension, 0, 1);
  return clamp(
    energyN * 0.33 +
    subN * 0.30 +
    intensityN * 0.17 +
    bpmConfN * 0.10 +
    phraseN * 0.06 +
    tensionN * 0.04,
    0,
    1
  );
}

function getMusicalAccentStrength() {
  const downbeat = state.beatInBar === 1 ? 1 : 0;
  const boundary = clamp(state.phraseBoundaryPulse, 0, 1);
  const buildLift = clamp(state.fluxTrend * 0.18, 0, 0.35);
  const releaseLift = clamp((state.subBassSmooth - 0.42) * 1.2, 0, 0.35);
  const downbeatLift = downbeat * (0.18 + 0.24 * state.downbeatConfidence);
  return clamp(1 + downbeatLift + boundary * 0.28 + buildLift + releaseLift, 0.75, 1.85);
}

function getFlashBudget() {
  const hot = getFlashHotScore();
  const reactiveGain = getReactiveFlashGain();
  const subBoost = state.subBass > 0.56 ? 1 : 0;
  const tempoBoost = state.bpmConfidence > 0.45 ? 1 : 0;
  const downbeatBoost = state.beatInBar === 1 ? 1 : 0;
  const phraseBoost = state.phraseBoundaryPulse > 0.52 ? 1 : 0;
  const betweenThrottle = (state.beatInBar !== 1 && hot < 0.48 && state.harmonicTension < 0.30) ? -1 : 0;
  const bySignal = Math.round((2 + hot * 10) * reactiveGain) + subBoost + tempoBoost + downbeatBoost + phraseBoost + betweenThrottle;
  const hardCap = Math.max(2, Math.floor((state.maxStrobeHz || 10) * state.tuneFlashRate * 1.35 * reactiveGain));
  return clamp(bySignal, 1, hardCap);
}

function canTriggerFlashEvent(now = performance.now()) {
  const budget = getFlashBudget();
  return SafetyLimiter.getRate(now) < budget;
}

const SafetyLimiter = {
  oneSecTimes: [],
  burstTimes: [],
  burstUntil: 0,
  cooldownUntil: 0,
  allowFlash(now, allowBurst = false) {
    if (now < this.cooldownUntil) return false;

    const oneSecMin = now - 1000;
    while (this.oneSecTimes.length && this.oneSecTimes[0] < oneSecMin) this.oneSecTimes.shift();

    const burstMin = now - 700;
    while (this.burstTimes.length && this.burstTimes[0] < burstMin) this.burstTimes.shift();

    const safety = clamp(state.tuneSafety, 0.6, 1.4);
    const reactiveGain = getReactiveFlashGain();
    const safetyMul = clamp(1.8 - safety, 0.35, 1.2); // allow more flashes while keeping hard guard
    const sustainedLimit = Math.max(2, Math.floor((state.maxStrobeHz || 3) * state.tuneFlashRate * safetyMul * reactiveGain));
    const hardGuardLimit = Math.max(14, sustainedLimit + 7);
    const burstLimit = Math.max(7, Math.floor(sustainedLimit * 2.1));

    // Hard guard
    if (this.oneSecTimes.length >= hardGuardLimit) {
      this.cooldownUntil = now + 900;
      return false;
    }

    // Burst handling: max 6 flashes/sec for <=700ms then forced cooldown
    if (allowBurst) {
      if (this.burstUntil < now && this.oneSecTimes.length >= 3) {
        this.burstUntil = now + 700;
      }
      if (this.burstUntil >= now) {
        if (this.burstTimes.length >= burstLimit) {
          this.cooldownUntil = now + 900;
          this.burstUntil = 0;
          return false;
        }
        return true;
      }
    }

    // Sustained limit
    if (this.oneSecTimes.length >= sustainedLimit) return false;
    return true;
  },
  recordFlash(now) {
    this.oneSecTimes.push(now);
    this.burstTimes.push(now);
  },
  getRate(now) {
    const oneSecMin = now - 1000;
    let c = 0;
    for (let i=this.oneSecTimes.length-1; i>=0; i--) {
      if (this.oneSecTimes[i] >= oneSecMin) c++;
      else break;
    }
    return c;
  },
  allowBeatPriority(now) {
    if (now < this.cooldownUntil) return false;
    const oneSecMin = now - 1000;
    while (this.oneSecTimes.length && this.oneSecTimes[0] < oneSecMin) this.oneSecTimes.shift();
    const presetRate = Math.max(2, (state.maxStrobeHz || 10) * Math.max(0.6, state.tuneFlashRate));
    const hardGuardLimit = Math.max(14, Math.floor(presetRate * 1.8));
    return this.oneSecTimes.length < hardGuardLimit;
  }
};

async function getSystemCaptureStream() {
  const attempts = [
    { audio: true, video: true, selfBrowserSurface: 'exclude', surfaceSwitching: 'include', systemAudio: 'include' },
    { audio: true, video: true, surfaceSwitching: 'include', systemAudio: 'include' },
    { audio: true, video: true },
  ];
  let lastError = null;
  for (const constraints of attempts) {
    try {
      return await navigator.mediaDevices.getDisplayMedia(constraints);
    } catch (e) {
      lastError = e;
      const unsupported = e && (
        e.name === 'TypeError' ||
        e.name === 'OverconstrainedError' ||
        e.name === 'NotSupportedError'
      );
      if (unsupported) continue;
      throw e;
    }
  }
  throw lastError || new Error('DISPLAY_MEDIA_FAILED');
}

async function startAudio() {
  try {
    await stopAudio();
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !navigator.mediaDevices.getDisplayMedia) {
      throw new Error('MEDIA_DEVICES_UNAVAILABLE');
    }
    const preset = state.presets[state.presetIndex];
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
    state.audioCtx.onstatechange = () => {
      if (!state.running) return;
      const s = state.audioCtx ? state.audioCtx.state : 'closed';
      if (s === 'interrupted' || s === 'suspended') {
        setStatusOverride('! AUDIO INTERRUPTED', 1200);
      }
    };
    if (state.audioCtx.state !== 'running') {
      try {
        await state.audioCtx.resume();
      } catch (_) {
        // Autoplay policy/user gesture edge case: handled by existing error path.
      }
    }
    state.analyser = state.audioCtx.createAnalyser();
    state.analyser.fftSize = preset.fftSize;
    state.analyser.smoothingTimeConstant = preset.smoothing;
    state.analyser.minDecibels = -90;
    state.analyser.maxDecibels = -18;

    state.sourceNodes = [];
    state.mediaStreams = [];

    // Source selector: MIC / SYSTEM / MIX
    if (state.sourceMode === 0 || state.sourceMode === 2) {
      const micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
        },
        video: false,
      });
      state.mediaStreams.push(micStream);
      const micSource = state.audioCtx.createMediaStreamSource(micStream);
      state.sourceNodes.push(micSource);
      micSource.connect(state.analyser);
    }

    if (state.sourceMode === 1 || state.sourceMode === 2) {
      const sysStream = await getSystemCaptureStream();
      const sysAudioTracks = sysStream.getAudioTracks();
      if (!sysAudioTracks.length) {
        sysStream.getTracks().forEach((t) => t.stop());
        throw new Error('SYSTEM_AUDIO_MISSING');
      }
      const sysAudioTrack = sysAudioTracks[0];
      state.systemAudioTrack = sysAudioTrack;
      sysAudioTrack.addEventListener('ended', () => {
        if (!state.running) return;
        stopAudio().then(() => {
          el.status.textContent = '✗ SYSTEM AUDIO ENDED';
        }).catch(() => {});
      });
      sysAudioTrack.addEventListener('mute', () => {
        if (!state.running) return;
        setStatusOverride('! SYSTEM AUDIO MUTED', 1200);
      });
      sysAudioTrack.addEventListener('unmute', () => {
        if (!state.running) return;
        setStatusOverride('● LIVE  SYSTEM AUDIO RESTORED', 1200);
      });
      state.mediaStreams.push(sysStream);
      const sysSource = state.audioCtx.createMediaStreamSource(sysStream);
      state.sourceNodes.push(sysSource);
      sysSource.connect(state.analyser);
    }

    state.bufferLen = state.analyser.frequencyBinCount;
    state.dataArray = new Uint8Array(state.bufferLen);
    state.prevFreqArray = new Uint8Array(state.bufferLen);
    state.waveArray = new Uint8Array(state.bufferLen);
    updateBandBins();
    state.dropDetector = createEdmDropDetector({
      sampleRate: state.audioCtx.sampleRate,
      fftSize: state.analyser.fftSize,
      binCount: state.bufferLen,
    });
    state.beatPeriodSec = 0.5;
    state.nextBeatAt = state.audioCtx.currentTime;
    state.beatPhaseConfidence = 0;
    state.lastStateSwitchSec = state.audioCtx.currentTime;

    state.running = true;
    startAnalysisLoop();
    el.idle.classList.add('hidden');
    el.status.textContent = '● LIVE';
    el.btnStart.textContent = '■ STOP';
    el.btnStart.classList.add('active');
  } catch(e) {
    await stopAudio();
    state.running = false;

    if (e && e.message === 'SYSTEM_AUDIO_MISSING') {
      el.status.textContent = '✗ NO SYSTEM AUDIO';
      alert('Systémový zvuk nebyl sdílen. Zkus znovu SOURCE: SYSTEM/MIX a při sdílení zapni "Share audio".');
      return;
    }

    if (e && e.message === 'MEDIA_DEVICES_UNAVAILABLE') {
      el.status.textContent = '✗ AUDIO UNSUPPORTED';
      alert('Tento prohlížeč nepodporuje potřebné audio API (mediaDevices). Otevři aplikaci v Chrome nebo Edge.');
      return;
    }

    if (e && (e.name === 'NotAllowedError' || e.name === 'SecurityError')) {
      el.status.textContent = '✗ AUDIO DENIED';
      alert('Přístup k audio zdroji byl zamítnut. Povol mikrofon/sdílení zvuku v prohlížeči.');
      return;
    }

    el.status.textContent = '✗ AUDIO ERROR';
    alert('Nepodařilo se spustit audio vstup. Zkontroluj oprávnění a zkus to znovu.');
  }
}
